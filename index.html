<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/milligram@1.4.1/dist/milligram.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="core.js"></script>
    <script src="param_widgets.js" defer></script>
    <script src="backend.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <h1 class="navbar-brand" id="navbar-brand">Zoomy</h1>
        <span class="backend-indicator connected" id="backend-indicator">numpy (pyodide)</span>
        <div class="navbar-links">
            <a href="#">Docs</a>
            <a href="#">GitHub</a>
        </div>
    </nav>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3>Actions</h3>
                <button class="sidebar-btn" id="btn-save">Save project</button>
                <button class="sidebar-btn" id="btn-load">Load project</button>
                <button class="sidebar-btn primary" id="btn-run-sim">&#9654; Run simulation</button>
            </div>
            <div class="sidebar-section">
                <h3>Backend</h3>
                <input class="sidebar-input" id="backend-url" placeholder="http://localhost:8080" value="http://localhost:8080">
                <button class="sidebar-btn" id="btn-connect">Connect</button>
            </div>
            <div class="sidebar-section">
                <h3>Sessions</h3>
                <ul class="sidebar-list" id="session-list"></ul>
                <button class="sidebar-btn" id="btn-new-session">+ New session</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="tabs" id="tab-bar"></div>
            <div id="tab-content"></div>
        </div>
    </div>

    <footer class="footer">
        <a href="#">About</a>
        <a href="#">Legal</a>
        <a href="#">Privacy</a>
        <span>&copy; 2026 Zoomy</span>
    </footer>

    <div id="loading-toast"></div>

</body>
</html>
