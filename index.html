<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/milligram@1.4.1/dist/milligram.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- crossorigin="anonymous" lets these cross-origin scripts satisfy
         COEP require-corp once the service worker makes the page
         cross-origin isolated (needed for SharedArrayBuffer). -->
    <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="core.js"></script>
    <script src="param_widgets.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <button class="hamburger" id="hamburger">&#9776;</button>
        <h1 class="navbar-brand" id="navbar-brand">Zoomy</h1>
        <span class="backend-indicator connected" id="backend-indicator">numpy (pyodide)</span>
        <div class="navbar-links">
            <a href="#">Docs</a>
            <a href="#">GitHub</a>
        </div>
    </nav>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3>Actions</h3>
                <button class="sidebar-btn" id="btn-save">Save project</button>
                <button class="sidebar-btn" id="btn-load">Load project</button>
                <button class="sidebar-btn primary" id="btn-run-sim">&#9654; Run simulation</button>
            </div>
            <div class="sidebar-section">
                <h3>Backend</h3>
                <input class="sidebar-input" id="backend-url" placeholder="http://localhost:8080" value="http://localhost:8080">
                <button class="sidebar-btn" id="btn-connect">Connect</button>
            </div>
            <div class="sidebar-section">
                <h3>Sessions</h3>
                <ul class="sidebar-list" id="session-list"></ul>
                <button class="sidebar-btn" id="btn-new-session">+ New session</button>
            </div>
        </aside>

        <div class="main-content">
            <div class="tabs" id="tab-bar"></div>
            <div id="tab-content"></div>
        </div>
    </div>

    <footer class="footer">
        <a href="https://zoomylab.github.io/Zoomy/" target="_blank" rel="noopener">Homepage</a>
        <span>&copy; 2026 Zoomy</span>
        <span id="gui-version" class="gui-version" title="Build version"></span>
    </footer>

    <div id="loading-toast"></div>

    <script>
    // Register the service worker, which injects COOP/COEP/CORP headers so
    // the page reaches crossOriginIsolated and SharedArrayBuffer works.
    // On the very first visit there's no controller yet — once the SW
    // activates we reload once so the navigation goes through it. The
    // sessionStorage sentinel prevents a reload loop if the SW somehow
    // fails to inject the headers (e.g. the first navigation bypasses the
    // SW entirely on some browsers).
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").then(function () {
            if (window.crossOriginIsolated) return;
            if (navigator.serviceWorker.controller) return;
            if (sessionStorage.getItem("zoomy-coi-reload")) return;
            navigator.serviceWorker.addEventListener("controllerchange", function onCtrl() {
                navigator.serviceWorker.removeEventListener("controllerchange", onCtrl);
                if (window.crossOriginIsolated) return;
                sessionStorage.setItem("zoomy-coi-reload", "1");
                location.reload();
            });
        }).catch(function () {});
        // Reset the sentinel once the page actually reaches COI so the next
        // cold visit is free to reload again if needed.
        if (window.crossOriginIsolated) sessionStorage.removeItem("zoomy-coi-reload");
    }
    // Display build version in footer
    fetch("version.json?t=" + Date.now()).then(function (r) { return r.json(); }).then(function (v) {
        var el = document.getElementById("gui-version");
        if (el) {
            el.textContent = "v" + (v.commit || "dev").substring(0, 7);
            el.title = "Build: " + (v.built || "local") + " — " + (v.commit || "");
        }
    }).catch(function () {});
    </script>
</body>
</html>
