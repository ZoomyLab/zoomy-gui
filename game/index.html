<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SWE Irrigation Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;overflow:hidden;height:100vh}
.game{display:grid;grid-template-columns:110px 1fr 70px;grid-template-rows:auto auto 1fr auto auto;
  gap:6px;max-width:900px;margin:0 auto;padding:8px;height:100vh}
.hdr{grid-column:1/-1;text-align:center;padding:4px}
.hdr h2{font-size:1.1em;margin-bottom:2px}
.hdr p{font-size:.85em;opacity:.8}
.gtop{grid-column:1/-1;display:flex;justify-content:center;gap:40px}
.left{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:10px}
.right{display:flex;flex-direction:column;align-items:center;justify-content:space-around;gap:4px}
.cvs-wrap{position:relative;aspect-ratio:1;background:#000;border-radius:4px;overflow:hidden}
.cvs-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated}
#draw-canvas{cursor:crosshair;z-index:1}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);z-index:2;font-size:1.2em}
.gbot{grid-column:1/-1;display:flex;justify-content:center}
.ctrl{grid-column:1/-1;display:flex;justify-content:center;gap:8px;padding:4px}
.ctrl button{padding:8px 16px;border:none;border-radius:4px;background:#2563eb;color:#fff;
  font-size:.9em;cursor:pointer}
.ctrl button:hover{background:#1d4ed8}
.ctrl button:disabled{background:#555;cursor:default}
.gauge{display:flex;align-items:center;gap:4px;font-size:1.4em}
.gauge progress{width:50px;height:16px;accent-color:#22c55e}
.big{font-size:2em;font-weight:bold;text-align:center}
.lbl{font-size:.75em;text-align:center;opacity:.7}
.hs{font-size:.8em;text-align:center;margin-top:8px}
.hs h3{font-size:.9em;margin-bottom:4px}
.inflow-arrow{font-size:2em;margin:10px 0}
</style>
</head>
<body>
<div class="game">
  <!-- Header -->
  <div class="hdr">
    <h2>Gesucht: Ingenieur für antike Bewässerungssysteme</h2>
    <p>Male dein Bewässerungssystem und öffne die Schleuse. <b>Ziel</b>: Fülle die Gärten &mdash; so schnell wie möglich!</p>
  </div>

  <!-- Top gauges -->
  <div class="gtop">
    <div class="gauge"><span id="f0">😢</span><progress id="b0" value="0" max="100"></progress></div>
    <div class="gauge"><span id="f1">😢</span><progress id="b1" value="0" max="100"></progress></div>
  </div>

  <!-- Left sidebar -->
  <div class="left">
    <div class="big" id="score">0</div><div class="lbl">Punkte</div>
    <div class="big" id="timer">60.0</div><div class="lbl">Zeit</div>
    <div class="inflow-arrow">→</div><div class="lbl">Zufluss</div>
    <div class="hs" id="hs"><h3>Highscore</h3></div>
  </div>

  <!-- Canvas -->
  <div class="cvs-wrap">
    <canvas id="flow-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
    <div id="loading">⏳ Loading solver&hellip;</div>
  </div>

  <!-- Right gauges -->
  <div class="right">
    <div class="gauge" style="flex-direction:column"><span id="f2">😢</span><progress id="b2" value="0" max="100"></progress></div>
    <div class="gauge" style="flex-direction:column"><span id="f3">😢</span><progress id="b3" value="0" max="100"></progress></div>
  </div>

  <!-- Bottom gauge -->
  <div class="gbot">
    <div class="gauge"><span id="f4">😢</span><progress id="b4" value="0" max="100"></progress></div>
  </div>

  <!-- Controls -->
  <div class="ctrl">
    <button id="btn-start">Schleuse öffnen</button>
    <button id="btn-clear">Skizze löschen</button>
    <button id="btn-reset">Zurücksetzen</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- Python solver code (loaded by Pyodide in web worker) -->
<!-- ═══════════════════════════════════════════ -->
<script type="text/python" id="solver-code">
import numpy as np
from time import time

F = np.float32

# ── Grid / physics parameters ──
SCALE = 5
NX = NY = 60 * SCALE
NG = 5
IW = IH = NX + 2 * NG  # image 310x310
N_ELEM = NX + 2
DX = F(20.0 / N_ELEM)
GRAVITY = F(9.81)
WET_TOL = F(1e-6)
CFL = F(0.45)
DT_MIN = F(1e-4)
DT_MAX = F(0.5)
HALF = F(0.5)
H_IN = F(0.1)
Q_IN = F(0.01)
END_TIME = 60.0
BUDGET = 0.08

O_IN  = [[175, 225]]
O_OUT = [[100, 150], [225, 275]]
O_TOP = [[75, 125], [200, 225]]
O_BOT = [[150, 200]]

def _ws(op):
    w, p = [], 0
    for a, b in op:
        w.append((p, a)); p = b
    w.append((p, NX)); return w

W_IN, W_OUT, W_TOP, W_BOT = _ws(O_IN), _ws(O_OUT), _ws(O_TOP), _ws(O_BOT)

# ── Solver ──
def _init_Q():
    q = np.zeros((4, N_ELEM, N_ELEM), dtype=np.float32)
    q[0] = F(0.01); _bc(q); return q

def _wd(q):
    d = q[0] <= WET_TOL; q[0][d]=0; q[1][d]=0; q[2][d]=0

def _bc(q):
    q[0,:,-1]=q[0,:,-2]; q[1,:,-1]=-q[1,:,-2]
    for a,b in O_OUT: q[1,a:b,-1]=np.maximum(q[1,a:b,-2],0)
    q[2,:,-1]=q[2,:,-2]; q[3,:,-1]=q[3,:,-2]
    q[0,:,0]=q[0,:,1]
    for a,b in O_IN: q[0,a:b,0]=np.maximum(q[0,a:b,1],H_IN)
    q[1,:,0]=-q[1,:,1]
    for a,b in O_IN: q[1,a:b,0]=np.where(q[1,a:b,1]>=0,Q_IN,q[1,a:b,1])
    q[2,:,0]=q[2,:,1]; q[3,:,0]=q[3,:,1]
    q[0,-1,:]=q[0,-2,:]; q[1,-1,:]=q[1,-2,:]; q[2,-1,:]=-q[2,-2,:]
    for a,b in O_TOP: q[2,-1,a:b]=np.maximum(q[2,-2,a:b],0)
    q[3,-1,:]=q[3,-2,:]
    q[0,0,:]=q[0,1,:]; q[1,0,:]=q[1,1,:]; q[2,0,:]=-q[2,1,:]
    for a,b in O_BOT: q[2,0,a:b]=np.minimum(q[2,1,a:b],0)
    q[3,0,:]=q[3,1,:]

def _flux(q):
    h=q[0]; sh=np.where(h>0,h,F(1))
    u=np.where(h>0,q[1]/sh,F(0)); v=np.where(h>0,q[2]/sh,F(0))
    z=np.zeros_like(h); hu=h*u; hv=h*v; hh=GRAVITY*h*h*HALF
    return np.array([hu,hu*u+hh,hu*v,z]), np.array([hv,hu*v,hv*v+hh,z])

def _step(q):
    _wd(q)
    Qi=q[:,1:-1,1:-1].copy(); Qn=q[:,2:,1:-1].copy()
    Qs=q[:,:-2,1:-1].copy(); Qe=q[:,1:-1,2:].copy(); Qw=q[:,1:-1,:-2].copy()
    for J in (Qn,Qs,Qw,Qe):
        m=J[3]>0; J[0][m]=Qi[0][m]; J[1][m]=-Qi[1][m]; J[2][m]=-Qi[2][m]
    Fi,Gi=_flux(Qi); Fn,Gn=_flux(Qn); Fs,Gs=_flux(Qs)
    Fe,Ge=_flux(Qe); Fw,Gw=_flux(Qw)
    h=q[0]; sh=np.where(h>0,h,F(1)); c=np.sqrt(GRAVITY*np.maximum(h,F(0)))
    s=max(float((np.where(h>0,np.abs(q[1]/sh),F(0))+c).max()),
          float((np.where(h>0,np.abs(q[2]/sh),F(0))+c).max()),1e-10)
    dt=float(max(DT_MIN,min(CFL*DX/F(s),DT_MAX)))
    sf=F(s)
    def lf(ql,qr,fl,fr): d=sf*(qr-ql); d[3]=0; return HALF*(fl+fr-d)
    Fwf=lf(Qw,Qi,Fw,Fi); Fef=lf(Qi,Qe,Fi,Fe)
    Gnf=lf(Qi,Qn,Gi,Gn); Gsf=lf(Qs,Qi,Gs,Gi)
    q[:,1:-1,1:-1]=Qi+F(dt/float(DX))*(Fwf-Fef+Gsf-Gnf)
    _wd(q); _bc(q); return dt

# ── Rendering (uint8 image) ──
def _render():
    ng = NG
    raw = np.clip(Q[0,1:-1,1:-1]*F(1275), F(0), F(254)).astype(np.uint8) + np.uint8(1)
    raw[raster[ng:-ng,ng:-ng]>0] = 0
    for a,b in W_IN:  raw[a:b,:ng]=0
    for a,b in W_OUT: raw[a:b,-ng:]=0
    for a,b in W_TOP: raw[-ng:,a:b]=0
    for a,b in W_BOT: raw[:ng,a:b]=0
    out = np.zeros((IH,IW), dtype=np.uint8)
    out[ng:-ng,ng:-ng] = raw
    out[raster>0] = 0
    for a,b in O_IN:  out[ng+a:ng+b,:ng]=raw[a:b,0:1]
    for a,b in O_OUT: out[ng+a:ng+b,-ng:]=raw[a:b,-1:]
    for a,b in O_TOP: out[-ng:,ng+a:ng+b]=raw[-1:,a:b]
    for a,b in O_BOT: out[:ng,ng+a:ng+b]=raw[0:1,a:b]
    return out

# ── API called from JS ──
Q = None
raster = None
game_time = 0.0
running = False
finished = False
outflow = [0.0]*5

# output slots read by JS after tick()
_img = bytes(IW*IH)
_time = 0.0
_of = [0.0]*5
_fin = False
_ns = 0

def init():
    global Q, raster, game_time, running, finished, outflow
    global _img, _time, _of, _fin, _ns
    Q = _init_Q(); raster = np.zeros((IH,IW),dtype=np.uint8)
    game_time=0.; running=False; finished=False; outflow=[0.]*5
    _time=0.; _of=[0.]*5; _fin=False; _ns=0
    _img = _render().tobytes()

def start_sim(raster_bytes):
    global raster, running
    raster = np.frombuffer(bytes(raster_bytes), dtype=np.uint8).reshape(IH,IW).copy()
    Q[3,1:-1,1:-1] = raster[NG:-NG,NG:-NG].astype(np.float32)
    running = True

def tick():
    global game_time, running, finished, outflow
    global _img, _time, _of, _fin, _ns
    n=0
    if running:
        t0=time(); dtacc=0.
        while time()-t0 < BUDGET:
            dt=_step(Q); game_time+=dt; dtacc+=dt; n+=1
            if game_time>=END_TIME:
                running=False; finished=True; game_time=END_TIME; break
        ig=0
        for a,b in O_TOP: outflow[ig]+=float(np.sum(Q[2,-2,a:b])*dtacc); ig+=1
        for i,(a,b) in enumerate(O_OUT): outflow[3-i]+=float(np.sum(Q[1,a:b,-2])*dtacc); ig+=1
        for a,b in O_BOT: outflow[ig]+=float(np.sum(-Q[2,1,a:b])*dtacc); ig+=1
        Q[3,1:-1,1:-1] = raster[NG:-NG,NG:-NG].astype(np.float32)
    _img = _render().tobytes()
    _time = float(game_time)
    _of = [float(x) for x in outflow]
    _fin = finished
    _ns = n

init()
</script>

<!-- ═══════════════════════════════════════════ -->
<!-- Main thread JS -->
<!-- ═══════════════════════════════════════════ -->
<script>
"use strict";

const W = 310, H = 310;

// ── Blues colour LUT (0 = black/wall, 1-255 = light→dark blue) ──
const LUT = new Uint8ClampedArray(256 * 4);
LUT[0]=0; LUT[1]=0; LUT[2]=0; LUT[3]=255;
for (let i = 1; i <= 255; i++) {
  const t = (i - 1) / 254;
  LUT[i*4]   = Math.round(247*(1-t) +   8*t);
  LUT[i*4+1] = Math.round(251*(1-t) +  48*t);
  LUT[i*4+2] = Math.round(255*(1-t) + 107*t);
  LUT[i*4+3] = 255;
}

// ── Canvases ──
const flowC = document.getElementById("flow-canvas");
const drawC = document.getElementById("draw-canvas");
flowC.width = drawC.width = W;
flowC.height = drawC.height = H;
const fCtx = flowC.getContext("2d");
const dCtx = drawC.getContext("2d");
dCtx.strokeStyle = "rgba(255,180,0,0.8)";
dCtx.lineWidth = 4;
dCtx.lineCap = dCtx.lineJoin = "round";

const imgData = fCtx.createImageData(W, H);

// ── Freehand drawing ──
let pen = false;
function pos(e) {
  const r = drawC.getBoundingClientRect();
  return [(e.clientX-r.left)/r.width*W, (e.clientY-r.top)/r.height*H];
}
drawC.addEventListener("pointerdown", e => {
  pen = true; const [x,y] = pos(e);
  dCtx.beginPath(); dCtx.moveTo(x,y);
  drawC.setPointerCapture(e.pointerId);
});
drawC.addEventListener("pointermove", e => {
  if (!pen) return; const [x,y] = pos(e);
  dCtx.lineTo(x,y); dCtx.stroke(); dCtx.beginPath(); dCtx.moveTo(x,y);
});
drawC.addEventListener("pointerup", () => pen = false);

function getRaster() {
  const px = dCtx.getImageData(0, 0, W, H);
  const r = new Uint8Array(W * H);
  for (let i = 0; i < W*H; i++) r[i] = px.data[i*4+3] > 30 ? 255 : 0;
  return r;
}

// ── Render a frame from the solver ──
function renderFrame(buf) {
  const d = imgData.data;
  for (let i = 0; i < W*H; i++) {
    const v = buf[i] << 2;  // *4 index into LUT
    d[(i<<2)]   = LUT[v];
    d[(i<<2)+1] = LUT[v+1];
    d[(i<<2)+2] = LUT[v+2];
    d[(i<<2)+3] = 255;
  }
  fCtx.putImageData(imgData, 0, 0);
}

// ── UI helpers ──
function face(v) { return v < 50 ? "😢" : v > 75 ? "😊" : "😐"; }

const highscores = [];
function updateUI(time, of, fin) {
  document.getElementById("timer").textContent = Math.max(0, 60-time).toFixed(1);
  let tot = 0;
  for (let i = 0; i < 5; i++) {
    const v = Math.min(100, Math.max(0, Math.round(of[i]/3*100)));
    document.getElementById("b"+i).value = v;
    document.getElementById("f"+i).textContent = face(v);
    tot += v;
  }
  let sc = tot;
  if (tot === 500) {
    const tf = 1 + (1 - Math.exp(-(60-time)/60));
    sc = Math.round(tot * tf + 0.4);
  }
  document.getElementById("score").textContent = sc;
  if (fin && !scoreSaved) {
    scoreSaved = true;
    highscores.push(sc); highscores.sort((a,b)=>b-a); highscores.length = Math.min(highscores.length, 10);
    document.getElementById("hs").innerHTML = "<h3>Highscore</h3>" +
      highscores.map((s,i) => `<div>${i+1}. ${s}</div>`).join("");
  }
}

// ── Web Worker (Pyodide + NumPy solver) ──
const pythonCode = document.getElementById("solver-code").textContent;

const workerSrc = `
importScripts("https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js");

let py = null;

async function boot() {
  py = await loadPyodide();
  await py.loadPackage("numpy");
  py.runPython(PYTHON_CODE);
  // send initial frame
  doTick();
  self.postMessage({type:"ready"});
}

function doTick() {
  py.runPython("tick()");
  const imgProxy = py.globals.get("_img");
  const img = imgProxy.toJs();          // bytes → Uint8Array
  imgProxy.destroy();
  const ofProxy = py.globals.get("_of");
  const of = ofProxy.toJs();            // list → Array
  ofProxy.destroy();
  self.postMessage({
    type: "frame",
    image: img,
    time:  py.globals.get("_time"),
    of:    Array.from(of),
    fin:   py.globals.get("_fin"),
    ns:    py.globals.get("_ns"),
  }, [img.buffer]);                      // transfer buffer
}

self.onmessage = function(e) {
  const m = e.data;
  if (m.type === "tick") { doTick(); }
  else if (m.type === "start") {
    const r = py.toPy(m.raster);
    py.globals.get("start_sim")(r);
    r.destroy();
    doTick();
  }
  else if (m.type === "reset") {
    py.globals.get("init")();
    doTick();
  }
};

const PYTHON_CODE = ${JSON.stringify(pythonCode)};
boot();
`;

let worker, active = false, scoreSaved = false;

function createWorker() {
  worker = new Worker(URL.createObjectURL(new Blob([workerSrc], {type:"text/javascript"})));
  worker.onmessage = function(e) {
    const m = e.data;
    if (m.type === "ready") {
      document.getElementById("loading").style.display = "none";
    }
    else if (m.type === "frame") {
      renderFrame(new Uint8Array(m.image));
      updateUI(m.time, m.of, m.fin);
      if (active && !m.fin) {
        requestAnimationFrame(() => worker.postMessage({type:"tick"}));
      } else if (m.fin) { active = false; }
    }
  };
}

// ── Buttons ──
document.getElementById("btn-start").onclick = function() {
  if (active) return;
  active = true; scoreSaved = false;
  this.disabled = true;
  const r = getRaster();
  dCtx.clearRect(0, 0, W, H);
  worker.postMessage({type:"start", raster: r}, [r.buffer]);
};

document.getElementById("btn-clear").onclick = function() {
  dCtx.clearRect(0, 0, W, H);
};

document.getElementById("btn-reset").onclick = function() {
  active = false; scoreSaved = false;
  dCtx.clearRect(0, 0, W, H);
  document.getElementById("btn-start").disabled = false;
  document.getElementById("score").textContent = "0";
  document.getElementById("timer").textContent = "60.0";
  for (let i = 0; i < 5; i++) {
    document.getElementById("b"+i).value = 0;
    document.getElementById("f"+i).textContent = "😢";
  }
  worker.postMessage({type:"reset"});
};

createWorker();
</script>
</body>
</html>
