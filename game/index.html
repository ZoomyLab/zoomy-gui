<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SWE Irrigation Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;overflow:hidden;height:100vh}
.game{display:grid;grid-template-columns:110px 1fr 70px;grid-template-rows:auto auto 1fr auto auto;
  gap:6px;max-width:900px;margin:0 auto;padding:8px;height:100vh}
.hdr{grid-column:1/-1;text-align:center;padding:4px}
.hdr h2{font-size:1.1em;margin-bottom:2px}
.hdr p{font-size:.85em;opacity:.8}
.gtop{grid-column:1/-1;display:flex;justify-content:center;gap:40px}
.left{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:10px}
.right{display:flex;flex-direction:column;align-items:center;justify-content:space-around;gap:4px}
.cvs-wrap{position:relative;aspect-ratio:1;background:#000;border-radius:4px;overflow:hidden}
.cvs-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated}
#draw-canvas{cursor:crosshair;z-index:1}
#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);z-index:2;font-size:1.2em}
.gbot{grid-column:1/-1;display:flex;justify-content:center}
.ctrl{grid-column:1/-1;display:flex;justify-content:center;gap:8px;padding:4px}
.ctrl button{padding:8px 16px;border:none;border-radius:4px;background:#2563eb;color:#fff;
  font-size:.9em;cursor:pointer}
.ctrl button:hover{background:#1d4ed8}
.ctrl button:disabled{background:#555;cursor:default}
.gauge{display:flex;align-items:center;gap:4px;font-size:1.4em}
.gauge progress{width:50px;height:16px;accent-color:#22c55e}
.big{font-size:2em;font-weight:bold;text-align:center}
.lbl{font-size:.75em;text-align:center;opacity:.7}
.hs{font-size:.8em;text-align:center;margin-top:8px}
.hs h3{font-size:.9em;margin-bottom:4px}
.inflow-arrow{font-size:2em;margin:10px 0}
</style>
</head>
<body>
<div class="game">
  <div class="hdr">
    <h2>Gesucht: Ingenieur für antike Bewässerungssysteme</h2>
    <p>Male dein Bewässerungssystem und öffne die Schleuse. <b>Ziel</b>: Fülle die Gärten &mdash; so schnell wie möglich!</p>
  </div>
  <div class="gtop">
    <div class="gauge"><span id="f0">😢</span><progress id="b0" value="0" max="100"></progress></div>
    <div class="gauge"><span id="f1">😢</span><progress id="b1" value="0" max="100"></progress></div>
  </div>
  <div class="left">
    <div class="big" id="score">0</div><div class="lbl">Punkte</div>
    <div class="big" id="timer">60.0</div><div class="lbl">Zeit</div>
    <div class="inflow-arrow">→</div><div class="lbl">Zufluss</div>
    <div class="hs" id="hs"><h3>Highscore</h3></div>
  </div>
  <div class="cvs-wrap">
    <canvas id="flow-canvas"></canvas>
    <canvas id="draw-canvas"></canvas>
    <div id="loading">⏳ Initializing&hellip;</div>
  </div>
  <div class="right">
    <div class="gauge" style="flex-direction:column"><span id="f2">😢</span><progress id="b2" value="0" max="100"></progress></div>
    <div class="gauge" style="flex-direction:column"><span id="f3">😢</span><progress id="b3" value="0" max="100"></progress></div>
  </div>
  <div class="gbot">
    <div class="gauge"><span id="f4">😢</span><progress id="b4" value="0" max="100"></progress></div>
  </div>
  <div class="ctrl">
    <button id="btn-start">Schleuse öffnen</button>
    <button id="btn-clear">Skizze löschen</button>
    <button id="btn-reset">Zurücksetzen</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════ -->
<!-- Main thread JS -->
<!-- ═══════════════════════════════════════════════════ -->
<script>
"use strict";

const W = 310, H = 310;

// ── Blues colour LUT (0 = black/wall, 1-255 = light→dark blue) ──
const LUT = new Uint8ClampedArray(256 * 4);
LUT[0]=0; LUT[1]=0; LUT[2]=0; LUT[3]=255;
for (let i = 1; i <= 255; i++) {
  const t = (i - 1) / 254;
  LUT[i*4]   = Math.round(247*(1-t) +   8*t);
  LUT[i*4+1] = Math.round(251*(1-t) +  48*t);
  LUT[i*4+2] = Math.round(255*(1-t) + 107*t);
  LUT[i*4+3] = 255;
}

// ── Canvases ──
const flowC = document.getElementById("flow-canvas");
const drawC = document.getElementById("draw-canvas");
flowC.width = drawC.width = W;
flowC.height = drawC.height = H;
const fCtx = flowC.getContext("2d");
const dCtx = drawC.getContext("2d");
dCtx.strokeStyle = "rgba(255,180,0,0.8)";
dCtx.lineWidth = 4;
dCtx.lineCap = dCtx.lineJoin = "round";

const imgData = fCtx.createImageData(W, H);

// ── Freehand drawing ──
let pen = false;
function pos(e) {
  const r = drawC.getBoundingClientRect();
  return [(e.clientX-r.left)/r.width*W, (e.clientY-r.top)/r.height*H];
}
drawC.addEventListener("pointerdown", e => {
  pen = true; const [x,y] = pos(e);
  dCtx.beginPath(); dCtx.moveTo(x,y);
  drawC.setPointerCapture(e.pointerId);
});
drawC.addEventListener("pointermove", e => {
  if (!pen) return; const [x,y] = pos(e);
  dCtx.lineTo(x,y); dCtx.stroke(); dCtx.beginPath(); dCtx.moveTo(x,y);
});
drawC.addEventListener("pointerup", () => pen = false);

function getRaster() {
  const px = dCtx.getImageData(0, 0, W, H);
  const r = new Uint8Array(W * H);
  for (let i = 0; i < W*H; i++) r[i] = px.data[i*4+3] > 30 ? 255 : 0;
  return r;
}

// ── Render a frame from the solver ──
function renderFrame(buf) {
  const d = imgData.data;
  for (let i = 0; i < W*H; i++) {
    const v = buf[i] << 2;
    d[(i<<2)]   = LUT[v];
    d[(i<<2)+1] = LUT[v+1];
    d[(i<<2)+2] = LUT[v+2];
    d[(i<<2)+3] = 255;
  }
  fCtx.putImageData(imgData, 0, 0);
}

// ── UI helpers ──
function face(v) { return v < 50 ? "\u{1F622}" : v > 75 ? "\u{1F60A}" : "\u{1F610}"; }

const highscores = [];
function updateUI(time, of, fin) {
  document.getElementById("timer").textContent = Math.max(0, 60-time).toFixed(1);
  let tot = 0;
  for (let i = 0; i < 5; i++) {
    const v = Math.min(100, Math.max(0, Math.round(of[i]/3*100)));
    document.getElementById("b"+i).value = v;
    document.getElementById("f"+i).textContent = face(v);
    tot += v;
  }
  let sc = tot;
  if (tot === 500) {
    const tf = 1 + (1 - Math.exp(-(60-time)/60));
    sc = Math.round(tot * tf + 0.4);
  }
  document.getElementById("score").textContent = sc;
  if (fin && !scoreSaved) {
    scoreSaved = true;
    highscores.push(sc); highscores.sort((a,b)=>b-a); highscores.length = Math.min(highscores.length, 10);
    document.getElementById("hs").innerHTML = "<h3>Highscore</h3>" +
      highscores.map((s,i) => "<div>"+(i+1)+". "+s+"</div>").join("");
  }
}

// ═══════════════════════════════════════════════════
// Web Worker — Pure JS SWE Solver (no Pyodide)
// ═══════════════════════════════════════════════════
const workerSrc = `
"use strict";

// ── Constants ──
const NX = 300, NY = 300, NG = 5;
const IW = NX + 2*NG, IH = NX + 2*NG;       // 310 image
const N  = NX + 2;                            // 302 solver grid (1 ghost each side)
const NN = N * N;                             // 91204
const G  = 9.81, HALF_G = 0.5 * G;
const WET = 1e-6, CFL = 0.45;
const DT_MIN = 1e-4, DT_MAX = 0.5;
const DX = 20.0 / N;
const END_TIME = 60.0, BUDGET = 0.08;
const H_IN = 0.1, Q_IN = 0.01;

// Boundary openings (in solver interior coords, 0-based in the N×N grid)
const O_IN  = [[175,225]];
const O_OUT = [[100,150],[225,275]];
const O_TOP = [[75,125],[200,225]];
const O_BOT = [[150,200]];

// Wall segments (complement of openings)
function wallSegs(op) {
  const w = []; let p = 0;
  for (const [a,b] of op) { w.push([p,a]); p = b; }
  w.push([p, NX]); return w;
}
const W_IN = wallSegs(O_IN), W_OUT = wallSegs(O_OUT);
const W_TOP = wallSegs(O_TOP), W_BOT = wallSegs(O_BOT);

// ── State: 4 flat Float32Arrays (struct-of-arrays, row-major j*N+i) ──
let qh, qhu, qhv, qw;         // current state
let qh2, qhu2, qhv2;          // double-buffer for updates
let raster;                     // Uint8Array(IW*IH) wall mask
let gameTime, running, finished;
let outflow;                    // [5] floats

function idx(j, i) { return j * N + i; }

// ── Init ──
function init() {
  qh  = new Float32Array(NN); qhu = new Float32Array(NN);
  qhv = new Float32Array(NN); qw  = new Float32Array(NN);
  qh2 = new Float32Array(NN); qhu2 = new Float32Array(NN); qhv2 = new Float32Array(NN);
  qh.fill(0.01);
  raster = new Uint8Array(IW * IH);
  gameTime = 0; running = false; finished = false;
  outflow = [0,0,0,0,0];
  applyBC();
}

// ── Wet/dry fix ──
function wetDry() {
  for (let k = 0; k < NN; k++) {
    if (qh[k] <= WET) { qh[k] = 0; qhu[k] = 0; qhv[k] = 0; }
  }
}

// ── Boundary conditions ──
function applyBC() {
  for (let j = 0; j < N; j++) {
    const jN = j * N;
    // East (i = N-1): reflective wall
    qh[jN+N-1]  = qh[jN+N-2];
    qhu[jN+N-1] = -qhu[jN+N-2];
    qhv[jN+N-1] = qhv[jN+N-2];
    qw[jN+N-1]  = qw[jN+N-2];
    // West (i = 0): reflective wall
    qh[jN]  = qh[jN+1];
    qhu[jN] = -qhu[jN+1];
    qhv[jN] = qhv[jN+1];
    qw[jN]  = qw[jN+1];
  }
  // East outflow openings
  for (const [a,b] of O_OUT) {
    for (let j = a; j < b; j++) {
      const jN = j * N;
      qhu[jN+N-1] = Math.max(qhu[jN+N-2], 0);
    }
  }
  // West inflow openings
  for (const [a,b] of O_IN) {
    for (let j = a; j < b; j++) {
      const jN = j * N;
      qh[jN] = Math.max(qh[jN+1], H_IN);
      qhu[jN] = qhu[jN+1] >= 0 ? Q_IN : qhu[jN+1];
    }
  }
  // North (j = N-1) and South (j = 0)
  const jn = (N-1)*N, j2 = (N-2)*N;
  for (let i = 0; i < N; i++) {
    qh[jn+i]  = qh[j2+i];
    qhu[jn+i] = qhu[j2+i];
    qhv[jn+i] = -qhv[j2+i];
    qw[jn+i]  = qw[j2+i];
    qh[i]     = qh[N+i];
    qhu[i]    = qhu[N+i];
    qhv[i]    = -qhv[N+i];
    qw[i]     = qw[N+i];
  }
  // North outflow openings
  for (const [a,b] of O_TOP) {
    for (let i = a; i < b; i++) {
      qhv[jn+i] = Math.max(qhv[j2+i], 0);
    }
  }
  // South outflow openings
  for (const [a,b] of O_BOT) {
    for (let i = a; i < b; i++) {
      qhv[i] = Math.min(qhv[N+i], 0);
    }
  }
}

// ── One solver step. Returns dt. ──
function step() {
  wetDry();

  // Pass 1: global max wave speed
  let sMax = 1e-10;
  for (let k = 0; k < NN; k++) {
    const h = qh[k];
    if (h <= 0) continue;
    const u = qhu[k] / h, v = qhv[k] / h;
    const c = Math.sqrt(G * h);
    const su = Math.abs(u) + c, sv = Math.abs(v) + c;
    if (su > sMax) sMax = su;
    if (sv > sMax) sMax = sv;
  }
  const dt = Math.max(DT_MIN, Math.min(CFL * DX / sMax, DT_MAX));
  const r = dt / DX;

  // Pass 2: fused reconstruction + flux + LF + update over interior cells
  for (let j = 1; j < N-1; j++) {
    for (let i = 1; i < N-1; i++) {
      const c  = j*N + i;
      const cn = (j+1)*N + i;
      const cs = (j-1)*N + i;
      const ce = j*N + (i+1);
      const cw = j*N + (i-1);

      // Center cell
      const hi = qh[c], hui = qhu[c], hvi = qhv[c];

      // Read 4 neighbours (with wall reflection where qw > 0)
      let hn = qh[cn], hun = qhu[cn], hvn = qhv[cn];
      if (qw[cn] > 0) { hn = hi; hun = -hui; hvn = -hvi; }
      let hs = qh[cs], hus = qhu[cs], hvs = qhv[cs];
      if (qw[cs] > 0) { hs = hi; hus = -hui; hvs = -hvi; }
      let he = qh[ce], hue = qhu[ce], hve = qhv[ce];
      if (qw[ce] > 0) { he = hi; hue = -hui; hve = -hvi; }
      let hw = qh[cw], huw = qhu[cw], hvw = qhv[cw];
      if (qw[cw] > 0) { hw = hi; huw = -hui; hvw = -hvi; }

      // Inline flux for each state: Fx = [hu, hu*u + ½gh², hu*v, 0]
      //                              Fy = [hv, hu*v, hv*v + ½gh², 0]
      // We only need components 0-2 (component 3 is always 0 and dissipation[3]=0)

      // Helper: velocity from (h, hu, hv)
      // For cell X: ux = hux/hx if hx>0 else 0, vx = hvx/hx if hx>0 else 0

      // Center
      const shi = hi > 0 ? hi : 1, ui = hi > 0 ? hui/shi : 0, vi = hi > 0 ? hvi/shi : 0;
      const fxi0=hi*ui, fxi1=hi*ui*ui+HALF_G*hi*hi, fxi2=hi*ui*vi;
      const fyi0=hi*vi, fyi1=hi*ui*vi, fyi2=hi*vi*vi+HALF_G*hi*hi;

      // North
      const shn = hn > 0 ? hn : 1, un = hn > 0 ? hun/shn : 0, vn = hn > 0 ? hvn/shn : 0;
      const fyn0=hn*vn, fyn1=hn*un*vn, fyn2=hn*vn*vn+HALF_G*hn*hn;

      // South
      const shs = hs > 0 ? hs : 1, us_ = hs > 0 ? hus/shs : 0, vs = hs > 0 ? hvs/shs : 0;
      const fys0=hs*vs, fys1=hs*us_*vs, fys2=hs*vs*vs+HALF_G*hs*hs;

      // East
      const she = he > 0 ? he : 1, ue = he > 0 ? hue/she : 0, ve = he > 0 ? hve/she : 0;
      const fxe0=he*ue, fxe1=he*ue*ue+HALF_G*he*he, fxe2=he*ue*ve;

      // West
      const shw = hw > 0 ? hw : 1, uw = hw > 0 ? huw/shw : 0, vw = hw > 0 ? hvw/shw : 0;
      const fxw0=hw*uw, fxw1=hw*uw*uw+HALF_G*hw*hw, fxw2=hw*uw*vw;

      // Lax-Friedrichs numerical fluxes at 4 interfaces
      // F_west  = 0.5*(Fw + Fi - s*(Qi - Qw))     [west face]
      // F_east  = 0.5*(Fi + Fe - s*(Qe - Qi))     [east face]
      // G_north = 0.5*(Gi + Gn - s*(Qn - Qi))     [north face]
      // G_south = 0.5*(Gs + Gi - s*(Qi - Qs))     [south face]
      // Update: Q_new = Q_old + r * (F_west - F_east + G_south - G_north)

      const fw0 = 0.5*(fxw0+fxi0 - sMax*(hi-hw));
      const fw1 = 0.5*(fxw1+fxi1 - sMax*(hui-huw));
      const fw2 = 0.5*(fxw2+fxi2 - sMax*(hvi-hvw));

      const fe0 = 0.5*(fxi0+fxe0 - sMax*(he-hi));
      const fe1 = 0.5*(fxi1+fxe1 - sMax*(hue-hui));
      const fe2 = 0.5*(fxi2+fxe2 - sMax*(hve-hvi));

      const gn0 = 0.5*(fyi0+fyn0 - sMax*(hn-hi));
      const gn1 = 0.5*(fyi1+fyn1 - sMax*(hun-hui));
      const gn2 = 0.5*(fyi2+fyn2 - sMax*(hvn-hvi));

      const gs0 = 0.5*(fys0+fyi0 - sMax*(hi-hs));
      const gs1 = 0.5*(fys1+fyi1 - sMax*(hui-hus));
      const gs2 = 0.5*(fys2+fyi2 - sMax*(hvi-hvs));

      qh2[c]  = hi  + r * (fw0 - fe0 + gs0 - gn0);
      qhu2[c] = hui + r * (fw1 - fe1 + gs1 - gn1);
      qhv2[c] = hvi + r * (fw2 - fe2 + gs2 - gn2);
    }
  }

  // Swap buffers
  const th = qh, thu = qhu, thv = qhv;
  qh = qh2; qhu = qhu2; qhv = qhv2;
  qh2 = th; qhu2 = thu; qhv2 = thv;

  wetDry();
  applyBC();
  return dt;
}

// ── Render uint8 image (310×310) ──
function render() {
  const img = new Uint8Array(IW * IH);  // 0 = wall/black
  const ng = NG;
  // Interior: scale h to 1-255
  for (let j = 0; j < NX; j++) {
    for (let i = 0; i < NY; i++) {
      const h = qh[(j+1)*N + (i+1)];
      const rj = j + ng, ri = i + ng;
      // Check obstacle
      if (raster[rj*IW + ri] > 0) continue; // stays 0
      const v = Math.min(h * 1275, 254);
      img[rj*IW + ri] = (v | 0) + 1;
    }
  }
  // Mark boundary walls as 0 (already 0, but mark port openings)
  for (const [a,b] of W_IN)  for (let j=a;j<b;j++) for (let i=0;i<ng;i++) img[(j+ng)*IW+i]=0;
  for (const [a,b] of W_OUT) for (let j=a;j<b;j++) for (let i=IW-ng;i<IW;i++) img[(j+ng)*IW+i]=0;
  for (const [a,b] of W_TOP) for (let j=IH-ng;j<IH;j++) for (let i=a+ng;i<b+ng;i++) img[j*IW+i]=0;
  for (const [a,b] of W_BOT) for (let j=0;j<ng;j++) for (let i=a+ng;i<b+ng;i++) img[j*IW+i]=0;
  // Fill port openings with adjacent interior flow
  for (const [a,b] of O_IN) {
    for (let j=a;j<b;j++) {
      const v = img[(j+ng)*IW + ng];
      for (let i=0;i<ng;i++) img[(j+ng)*IW+i] = v;
    }
  }
  for (const [a,b] of O_OUT) {
    for (let j=a;j<b;j++) {
      const v = img[(j+ng)*IW + (IW-ng-1)];
      for (let i=IW-ng;i<IW;i++) img[(j+ng)*IW+i] = v;
    }
  }
  for (const [a,b] of O_TOP) {
    for (let i=a;i<b;i++) {
      const v = img[(IH-ng-1)*IW + (i+ng)];
      for (let j=IH-ng;j<IH;j++) img[j*IW+(i+ng)] = v;
    }
  }
  for (const [a,b] of O_BOT) {
    for (let i=a;i<b;i++) {
      const v = img[ng*IW + (i+ng)];
      for (let j=0;j<ng;j++) img[j*IW+(i+ng)] = v;
    }
  }
  // Mark raster obstacles in ghost region too
  for (let k = 0; k < IW*IH; k++) { if (raster[k] > 0) img[k] = 0; }
  return img;
}

// ── Worker API ──
function startSim(rasterBuf) {
  raster = new Uint8Array(rasterBuf);
  // Copy obstacle mask into solver wall field
  for (let j = 0; j < NX; j++) {
    for (let i = 0; i < NY; i++) {
      qw[(j+1)*N + (i+1)] = raster[(j+NG)*IW + (i+NG)] > 0 ? 1 : 0;
    }
  }
  running = true;
}

function tick() {
  let ns = 0;
  if (running) {
    const t0 = performance.now();
    let dtacc = 0;
    while ((performance.now() - t0) < BUDGET * 1000) {
      const dt = step();
      gameTime += dt; dtacc += dt; ns++;
      if (gameTime >= END_TIME) {
        running = false; finished = true; gameTime = END_TIME; break;
      }
    }
    // Accumulate outflow at gauge openings
    let ig = 0;
    for (const [a,b] of O_TOP) {
      let s = 0;
      for (let i = a; i < b; i++) s += qhv[(N-2)*N + i];
      outflow[ig++] += s * dtacc;
    }
    for (let oi = 0; oi < O_OUT.length; oi++) {
      const [a,b] = O_OUT[oi];
      let s = 0;
      for (let j = a; j < b; j++) s += qhu[j*N + (N-2)];
      outflow[3 - oi] += s * dtacc;
    }
    for (const [a,b] of O_BOT) {
      let s = 0;
      for (let i = a; i < b; i++) s += -qhv[1*N + i];
      outflow[ig++] += s * dtacc;
    }
    // Re-stamp obstacles into solver
    for (let j = 0; j < NX; j++)
      for (let i = 0; i < NY; i++)
        qw[(j+1)*N + (i+1)] = raster[(j+NG)*IW + (i+NG)] > 0 ? 1 : 0;
  }
  const img = render();
  self.postMessage({
    type: "frame", image: img.buffer,
    time: gameTime, of: outflow.slice(), fin: finished, ns: ns
  }, [img.buffer]);
}

// ── Message handler ──
self.onmessage = function(e) {
  const m = e.data;
  if      (m.type === "tick")  { tick(); }
  else if (m.type === "start") { startSim(m.raster); tick(); }
  else if (m.type === "reset") { init(); tick(); }
};

// Boot
init();
tick();  // send initial frame
self.postMessage({type: "ready"});
`;

let worker, active = false, scoreSaved = false;

function createWorker() {
  worker = new Worker(URL.createObjectURL(new Blob([workerSrc], {type:"text/javascript"})));
  worker.onmessage = function(e) {
    const m = e.data;
    if (m.type === "ready") {
      document.getElementById("loading").style.display = "none";
    }
    else if (m.type === "frame") {
      renderFrame(new Uint8Array(m.image));
      updateUI(m.time, m.of, m.fin);
      if (active && !m.fin) {
        requestAnimationFrame(() => worker.postMessage({type:"tick"}));
      } else if (m.fin) { active = false; }
    }
  };
}

// ── Buttons ──
document.getElementById("btn-start").onclick = function() {
  if (active) return;
  active = true; scoreSaved = false;
  this.disabled = true;
  const r = getRaster();
  dCtx.clearRect(0, 0, W, H);
  worker.postMessage({type:"start", raster: r}, [r.buffer]);
};

document.getElementById("btn-clear").onclick = function() {
  dCtx.clearRect(0, 0, W, H);
};

document.getElementById("btn-reset").onclick = function() {
  active = false; scoreSaved = false;
  dCtx.clearRect(0, 0, W, H);
  document.getElementById("btn-start").disabled = false;
  document.getElementById("score").textContent = "0";
  document.getElementById("timer").textContent = "60.0";
  for (let i = 0; i < 5; i++) {
    document.getElementById("b"+i).value = 0;
    document.getElementById("f"+i).textContent = "\u{1F622}";
  }
  worker.postMessage({type:"reset"});
};

createWorker();
</script>
</body>
</html>
